<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/jpeg" href="IMG_0304.jpeg">  <!-- Favicon -->
  <link rel="apple-touch-icon" href="IMG_0304.jpeg">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TUNES</title>
  <style>  
    body { box-sizing: border-box }
    /* equalizercontainer */
.equalizercontainer {
  cursor: pointer;
  padding: 2px;
  width: 30px;
  height: 20px;   
}

 /* Equalizer */
.EQ {
  font-size:  0.8em;
  text-align: left;
  color: lime;
  text-shadow: 1px 1px 1px ivory;
  font-weight: bold;
  margin-top:  0px;
  margin-left:  5px;
  padding: 2px;
  border: 1px solid lime;
}

/* Sidebar */
.sidebar {
  position: fixed;
  margin-top: 0px;
  margin-left: -210px; 
  width: 200px; 
  height: 70px;
  color: black;
  background: white;
  background-image: radial-gradient(#090,
                                #fff, #2a4f32);
  text-align: center;
  font-size: 1em;
  padding-top: 10px; 
  padding-bottom: 10px;
  transition: 0.3s;
}
  


.sidebar.active {
  margin-left: 0px;
}
  </style>
 
  
</head>
<body>

     <!-- Green Header -->
   <header>
    <h1>🎵 Tunes 🎵</h1>
                </header>


<!-- 🎵 MP3 PLAYER 🎵 -->
       <div class="container">
    <div class="player">
        <div class="details">
            <div class="now-playing">Now Playing: <span id="track-name">Track Name</span></div>
            <div class="track-artist" id="track-artist">Artist Name</div>
        </div>
        <div class="controls">
            <button id="play">Play</button>
            <button id="pause">Pause</button>
            <button id="next">Next</button>
            <button id="previous">Previous</button>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
        </div>
        <div class="playlist" id="playlist"></div>
        <audio id="audio"></audio> 
    </div></div>
        <!-- Build Download -->
  <a id="download-link" href="#" download>Download Song</a>
  <!-- Equalizer -->
  <div class="equalizercontainer" onclick="toggleSidebar()">
         <div class="EQ">EQ</div>
         </div>
         <div id="sidebar" class="sidebar">

<label for=“bass”>Bass</label>
<input type="range" min="-10" max="10" value="0" id="bass"><br>
<label for=“mid”>Mid</label>
<input type="range" min="-10" max="10" value="0" id="mid"><br>
<label for=“treble”>Treble</label>
<input type="range" min="-10" max="10" value="0" id="treble">
</div>
  <!-- toggle sidebar function -->   
<script>
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}
</script>


  

  
         <!-- JavaScript Files -->
     <script src="js/tunes.js"></script>



</body>
  <div class="footer">
<footer style="text-align: center; color: forestgreen; font-size: .8em;">
      © [2026] Created by the<br>Grim☠️Reaper!
    </footer>
  </div>
</html>
