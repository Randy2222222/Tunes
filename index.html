<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/jpeg" href="IMG_0304.jpeg">  <!-- Favicon -->
  <link rel="apple-touch-icon" href="IMG_0304.jpeg">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8">

<title>TUNES</title>
 
  
</head>
<body>

     <!-- Green Header -->
   <header>
    <h1>🎵 Tunes 🎵</h1>
                </header>


<!-- 🎵 MP3 PLAYER 🎵 -->
       <div class="container">
    <div class="player">
        <div class="details">
            <div class="now-playing">Now Playing: <span id="track-name">Track Name</span></div>
            <div class="track-artist" id="track-artist">Artist Name</div>
        </div>
        <div class="controls">
            <button id="play">Play</button>
            <button id="pause">Pause</button>
            <button id="next">Next</button>
            <button id="previous">Previous</button>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
        </div>
        <div class="playlist" id="playlist"></div>
        <audio id="audio"></audio> 
    </div></div>
        <!-- Build Download -->
  <a id="download-link" href="#" download>Download Song</a>


  

  
         <!-- JavaScript Files -->
     <script src="js/tunes.js"></script>



</body>
